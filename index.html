<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AOM Quick Reference — BCA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #0B1F4F;
  --navy-mid:   #142766;
  --navy-light: #1E3A8A;
  --teal:       #00C5D5;
  --teal-dark:  #0099A8;
  --teal-glow:  rgba(0,197,213,.3);
  --white:      #FFFFFF;
  --bg:         #F0F4F9;
  --card:       #FFFFFF;
  --border:     #E2E8F0;
  --text:       #0F172A;
  --muted:      #64748B;
  --g50:        #F8FAFC;
  --g100:       #F1F5F9;
  --g200:       #E2E8F0;
  --g300:       #CBD5E1;
  --g500:       #64748B;
  --g700:       #334155;
  --g900:       #0F172A;
  --red:        #EF4444;
  --amber:      #F59E0B;
  --green:      #10B981;
  --purple:     #8B5CF6;
  --r-sm:8px; --r:12px; --r-lg:16px; --r-full:999px;
  --shadow:     0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.07);
  --shadow-md:  0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:  0 20px 50px rgba(0,0,0,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Outfit',sans-serif}

/* ── HEADER ─────────────────────────────────────────────────────────── */
.hdr{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 55%,var(--navy-light) 100%);
  padding:env(safe-area-inset-top,12px) 16px 0;
  padding-top:calc(env(safe-area-inset-top,0px) + 12px);
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 24px rgba(0,0,0,.28);
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.brand{display:flex;align-items:center;gap:11px}
.brand-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dark) 100%);
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  box-shadow:0 2px 12px var(--teal-glow);
}
.brand-text h1{color:#fff;font-size:16px;font-weight:800;letter-spacing:-.3px;line-height:1.2}
.brand-text p{color:rgba(255,255,255,.55);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-top:1px}
.hdr-btns{display:flex;gap:7px}
.hdr-btn{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;transition:all .15s;
}
.hdr-btn:active{background:rgba(255,255,255,.2);transform:scale(.93)}
.search-wrap{position:relative;margin-bottom:11px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.45);font-size:15px;pointer-events:none}
.search{
  width:100%;padding:10px 38px 10px 38px;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);
  border-radius:var(--r-sm);color:#fff;font-size:14px;outline:none;
  font-family:'DM Sans',sans-serif;transition:all .2s;
  -webkit-appearance:none;
}
.search::placeholder{color:rgba(255,255,255,.45)}
.search:focus{background:rgba(255,255,255,.17);border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,197,213,.22)}
.search-x{
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.55);cursor:pointer;font-size:18px;display:none;
  padding:2px;
}
.tabs-row{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.tabs-row::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:5px 13px;border-radius:var(--r-full);
  font-size:11.5px;font-weight:700;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.22);color:rgba(255,255,255,.68);
  background:transparent;transition:all .18s;white-space:nowrap;
  font-family:'Outfit',sans-serif;letter-spacing:.2px;
}
.tab.on{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 2px 10px rgba(0,197,213,.4)}
.tab:active{transform:scale(.93)}

/* ── MAIN ────────────────────────────────────────────────────────────── */
.main{padding:14px 14px 100px;max-width:1100px;margin:0 auto}
.results-bar{font-size:11.5px;color:var(--muted);margin-bottom:12px;font-weight:500}
.grp-hdr{
  display:flex;align-items:center;gap:8px;
  margin:22px 0 10px;
}
.grp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.grp-hdr h2{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--g700)}
.grp-hdr span{font-size:11px;color:var(--muted);font-weight:500}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(152px,1fr));
  gap:10px;
}
@media(min-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(168px,1fr))}}
@media(min-width:700px){.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}}
@media(min-width:1000px){.grid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}}

/* ── CARD ────────────────────────────────────────────────────────────── */
.card{
  background:var(--card);border-radius:var(--r);padding:13px;
  cursor:pointer;box-shadow:var(--shadow);
  border:1.5px solid transparent;
  transition:all .2s;position:relative;overflow:hidden;
}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--teal);transform:translateY(-2px)}
.card:active{transform:scale(.96)}
.card-bar{
  position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;
}
.card-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.badge{
  font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:var(--r-full);
  text-transform:uppercase;letter-spacing:.3px;font-family:'Outfit',sans-serif;
}
.b-lt{background:#DCFCE7;color:#166534}
.b-st{background:#FEF3C7;color:#92400E}
.b-ol{background:#F1F5F9;color:#475569}
.b-pl{background:#F3E8FF;color:#6B21A8}
.b-ctl{background:#FEE2E2;color:#991B1B}
.card-name{font-size:14.5px;font-weight:800;color:var(--g900);line-height:1.25;margin-bottom:2px;font-family:'Outfit',sans-serif}
.card-brand{font-size:11.5px;color:var(--muted);margin-bottom:8px;font-style:italic}
.card-class{font-size:11px;color:var(--g700);font-weight:600;line-height:1.35;margin-bottom:6px}
.card-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:9px;padding-top:9px;border-top:1px solid var(--g100);
}
.eff-pill{font-size:11px;font-weight:800;padding:3px 8px;border-radius:var(--r-full);font-family:'Outfit',sans-serif}
.e0{background:#F1F5F9;color:#64748B}
.e1{background:#FEF3C7;color:#92400E}
.e2{background:#D1FAE5;color:#065F46}
.e3{background:#6EE7B7;color:#022C22}
.e4{background:#EDE9FE;color:#5B21B6}
.card-arr{color:var(--g300);font-size:16px}
.no-results{text-align:center;padding:64px 20px;color:var(--muted)}
.no-results .ico{font-size:52px;margin-bottom:12px}
.no-results h3{font-size:18px;font-weight:700;color:var(--g700);margin-bottom:6px;font-family:'Outfit',sans-serif}

/* ── OVERLAY ─────────────────────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(11,31,79,.55);
  z-index:200;opacity:0;visibility:hidden;
  transition:all .28s;backdrop-filter:blur(3px);
}
.overlay.on{opacity:1;visibility:visible}

/* ── BOTTOM SHEET ────────────────────────────────────────────────────── */
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-radius:20px 20px 0 0;
  z-index:201;transform:translateY(105%);
  transition:transform .38s cubic-bezier(.34,1.4,.64,1);
  max-height:92vh;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.sheet.on{transform:translateY(0)}
@media(min-width:700px){
  .sheet{max-width:580px;left:50%;transform:translateX(-50%) translateY(105%)}
  .sheet.on{transform:translateX(-50%) translateY(0)}
}
.handle{width:38px;height:4px;background:var(--g200);border-radius:2px;margin:11px auto 0;flex-shrink:0}
.sheet-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;
  background:var(--g100);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--g500);z-index:1;transition:all .15s;
}
.sheet-close:active{background:var(--g200)}

/* DRUG SHEET HEADER */
.ds-hdr{padding:14px 18px 0;flex-shrink:0;position:relative}
.ds-grp-lbl{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-family:'Outfit',sans-serif}
.ds-name{font-size:22px;font-weight:900;color:var(--navy);line-height:1.15;font-family:'Outfit',sans-serif;margin-bottom:2px}
.ds-brand{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:10px}
.ds-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.ds-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-full);font-family:'Outfit',sans-serif}
.eff-strip{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  border-radius:var(--r-sm);padding:10px 14px;margin-bottom:0;
  display:flex;align-items:center;justify-content:space-between;
  margin:0 18px 14px;flex-shrink:0;
}
.eff-strip-l .lbl{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase;letter-spacing:.4px;font-family:'Outfit',sans-serif}
.eff-strip-l .val{font-size:20px;font-weight:900;color:var(--teal);font-family:'Outfit',sans-serif;line-height:1}
.eff-strip-r{font-size:11.5px;color:rgba(255,255,255,.65);max-width:56%;text-align:right;line-height:1.4}

/* DETAIL TABS */
.dtabs{
  display:flex;border-bottom:1.5px solid var(--g200);
  padding:0 18px;flex-shrink:0;
}
.dtab{
  flex:1;padding:9px 4px;font-size:12.5px;font-weight:700;
  color:var(--g500);cursor:pointer;
  border-bottom:2.5px solid transparent;margin-bottom:-1.5px;
  text-align:center;transition:all .15s;font-family:'Outfit',sans-serif;
  letter-spacing:.1px;
}
.dtab.on{color:var(--navy);border-bottom-color:var(--teal)}
.sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.sheet-body::-webkit-scrollbar{width:3px}
.sheet-body::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}
.dpanel{display:none;padding:14px 18px 36px}
.dpanel.on{display:block}
.dsec-title{
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;
  color:var(--teal-dark);margin-bottom:8px;font-family:'Outfit',sans-serif;
}
.ditem{
  display:flex;align-items:flex-start;gap:7px;
  padding:5px 0;font-size:13px;color:var(--g700);line-height:1.5;
  border-bottom:1px solid var(--g100);
}
.ditem:last-child{border-bottom:none}
.ditem::before{content:'›';color:var(--teal);font-weight:700;flex-shrink:0;font-size:16px;margin-top:-1px}
.dstep{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--g100)}
.dstep:last-child{border-bottom:none}
.dstep-n{
  width:22px;height:22px;border-radius:50%;
  background:var(--teal);color:#fff;font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  margin-top:1px;font-family:'Outfit',sans-serif;
}
.dstep-t{font-size:13px;color:var(--g700);line-height:1.5;flex:1}
.stop-box{
  background:linear-gradient(135deg,#FFFBEB,#FEF3C7);
  border:1px solid #FCD34D;border-radius:var(--r-sm);
  padding:10px 13px;margin-top:10px;
}
.stop-box strong{
  display:block;font-size:10px;text-transform:uppercase;
  letter-spacing:.4px;color:#92400E;margin-bottom:4px;
  font-family:'Outfit',sans-serif;font-weight:800;
}
.stop-box p{font-size:12.5px;color:#78350F;line-height:1.5}
.warn-box{
  background:#FFF5F5;border:1px solid #FECACA;
  border-radius:var(--r-sm);padding:10px 13px;margin-bottom:10px;
  font-size:12.5px;color:#991B1B;line-height:1.5;
  display:flex;gap:8px;align-items:flex-start;
}
.info-box{
  background:#EFF6FF;border:1px solid #BFDBFE;
  border-radius:var(--r-sm);padding:10px 13px;
  font-size:12.5px;color:#1E40AF;line-height:1.5;margin-bottom:10px;
}
.dsec{margin-bottom:14px}

/* ── FAB ─────────────────────────────────────────────────────────────── */
.fab{
  position:fixed;bottom:24px;right:16px;
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dark) 100%);
  color:#fff;border:none;border-radius:14px;
  padding:11px 16px;font-size:13px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 22px rgba(0,197,213,.45);
  display:flex;align-items:center;gap:7px;z-index:150;
  transition:all .2s;font-family:'Outfit',sans-serif;letter-spacing:.2px;
  bottom:calc(24px + env(safe-area-inset-bottom,0px));
}
.fab:active{transform:scale(.95)}
.fab-dot{
  width:7px;height:7px;border-radius:50%;background:#fff;
  opacity:0;transition:opacity .2s;
}
.fab.has-sel .fab-dot{opacity:1}
@keyframes pulse{0%,100%{box-shadow:0 4px 22px rgba(0,197,213,.45)}50%{box-shadow:0 4px 32px rgba(0,197,213,.7)}}
.fab{animation:pulse 2.5s ease-in-out infinite}

/* ── NEXT STEP SHEET ──────────────────────────────────────────────────── */
.ns-sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-radius:20px 20px 0 0;
  z-index:201;transform:translateY(105%);
  transition:transform .38s cubic-bezier(.34,1.4,.64,1);
  max-height:94vh;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.ns-sheet.on{transform:translateY(0)}
@media(min-width:700px){
  .ns-sheet{max-width:600px;left:50%;transform:translateX(-50%) translateY(105%)}
  .ns-sheet.on{transform:translateX(-50%) translateY(0)}
}
.ns-hdr{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  padding:20px 18px 16px;border-radius:20px 20px 0 0;flex-shrink:0;position:relative;
}
.ns-hdr .handle{background:rgba(255,255,255,.25);margin:0 auto 14px}
.ns-hdr h2{color:#fff;font-size:19px;font-weight:900;margin-bottom:3px;font-family:'Outfit',sans-serif}
.ns-hdr p{color:rgba(255,255,255,.65);font-size:12.5px}
.ns-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.15);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:rgba(255,255,255,.8);transition:all .15s;
}
.ns-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding:16px 16px 20px}
.ns-body::-webkit-scrollbar{width:3px}
.ns-body::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}
.ns-sec-t{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin-bottom:9px;font-family:'Outfit',sans-serif;
}
.ns-list{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.ns-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;border-radius:var(--r-sm);
  border:1.5px solid var(--g200);cursor:pointer;transition:all .15s;
}
.ns-row.sel{border-color:var(--teal);background:rgba(0,197,213,.06)}
.ns-row-info{flex:1}
.ns-row-info .nm{font-size:13.5px;font-weight:700;color:var(--g900);font-family:'Outfit',sans-serif}
.ns-row-info .br{font-size:11.5px;color:var(--muted)}
.ns-chk{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--g300);display:flex;align-items:center;
  justify-content:center;transition:all .15s;flex-shrink:0;font-size:12px;
}
.ns-row.sel .ns-chk{background:var(--teal);border-color:var(--teal);color:#fff}
.ns-empty{text-align:center;padding:28px 16px;color:var(--muted)}
.ns-empty .ico{font-size:40px;margin-bottom:8px}
.ns-empty p{font-size:13px}

/* REC CARD */
.rec-card{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 60%,var(--navy-light) 100%);
  border-radius:var(--r);padding:16px;color:#fff;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.rec-card::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(0,197,213,.12);
}
.rec-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--teal);margin-bottom:5px;font-family:'Outfit',sans-serif}
.rec-name{font-size:21px;font-weight:900;font-family:'Outfit',sans-serif;margin-bottom:2px;line-height:1.15}
.rec-brand{font-size:12.5px;color:rgba(255,255,255,.6);font-style:italic;margin-bottom:12px}
.rec-stats{display:flex;gap:8px;margin-bottom:12px}
.rec-stat{flex:1;background:rgba(255,255,255,.1);border-radius:8px;padding:8px 10px;text-align:center}
.rec-stat .sl{font-size:9.5px;color:rgba(255,255,255,.55);font-weight:700;text-transform:uppercase;letter-spacing:.3px;font-family:'Outfit',sans-serif}
.rec-stat .sv{font-size:15px;font-weight:900;color:var(--teal);font-family:'Outfit',sans-serif;line-height:1.15}
.rec-why{font-size:12.5px;color:rgba(255,255,255,.82);line-height:1.55;margin-bottom:12px}
.rec-chk-box{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 12px}
.rec-chk-box .t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:rgba(255,255,255,.55);margin-bottom:6px;font-family:'Outfit',sans-serif}
.rec-chk-item{font-size:12px;color:rgba(255,255,255,.78);padding:3px 0;display:flex;gap:6px;line-height:1.4}
.rec-chk-item::before{content:'⚠';font-size:11px;flex-shrink:0;margin-top:1px}
.btn-view{
  width:100%;padding:12px;background:var(--teal);
  color:#fff;border:none;border-radius:var(--r-sm);
  font-size:14px;font-weight:800;cursor:pointer;margin-top:12px;
  transition:all .15s;font-family:'Outfit',sans-serif;letter-spacing:.2px;
}
.btn-view:active{background:var(--teal-dark)}

/* COMP TABLE */
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.cmp-tbl th{background:var(--g100);padding:7px 9px;text-align:left;font-weight:800;color:var(--g700);font-size:10.5px;font-family:'Outfit',sans-serif;letter-spacing:.2px}
.cmp-tbl td{padding:6px 9px;border-bottom:1px solid var(--g100);vertical-align:top;color:var(--g700);line-height:1.45}
.cmp-tbl tr:last-child td{border-bottom:none}
.c-old{color:#DC2626;font-weight:600}
.c-new{color:#059669;font-weight:600}
.c-lbl{color:var(--muted);font-size:10.5px;font-weight:600;font-family:'Outfit',sans-serif}
.divider{height:1px;background:var(--g200);margin:14px 0}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-top">
    <div class="brand">
      <div class="brand-icon">⚕</div>
      <div class="brand-text">
        <h1>AOM Quick Reference</h1>
        <p>Bariatric Centers of America · 2026</p>

// RENDER HELPERS
// ══════════════════════════════════════════════════════════════════════
function getBadgeHtml(b){ return `<span class="badge ${b[0]}">${b[1]}</span>` }

function renderTabs(){
  const tr = document.getElementById('tabsRow');
  const tabs = [{id:'all',label:'All Drugs'},...GROUPS.map(g=>({id:'g'+g.id,label:g.label}))];
  tr.innerHTML = tabs.map(t=>`<div class="tab${state.tab===t.id?' on':''}" data-tab="${t.id}">${t.label}</div>`).join('');
  tr.querySelectorAll('.tab').forEach(el=>el.addEventListener('click',()=>{
    state.tab=el.dataset.tab; state.search='';
    document.getElementById('searchInput').value='';
    document.getElementById('searchX').style.display='none';
    renderTabs(); renderDrugs();
  }));
}

function filterDrugs(){
  let list = DRUGS;
  if(state.tab!=='all') list = list.filter(d=>'g'+d.group===state.tab);
  if(state.search){
    const q=state.search.toLowerCase();
    list=list.filter(d=>
      d.name.toLowerCase().includes(q)||
      d.brand.toLowerCase().includes(q)||
      d.class.toLowerCase().includes(q)||
      (d.dosing||[]).some(x=>x.t&&x.t.toLowerCase().includes(q))
    );
  }
  return list;
}

function cardHtml(d){
  const g = GROUPS.find(g=>g.id===d.group);
  return `
  <div class="card group-${d.group}" data-id="${d.id}" style="cursor:pointer" role="button" tabindex="0" aria-label="Open ${d.name}">
    <div class="card-bar" style="background:${g?g.color:'#64748B'}"></div>
    <div class="card-badges">${d.badges.map(getBadgeHtml).join('')}</div>
    <div class="card-name">${d.name}</div>
    <div class="card-brand">${d.brand}</div>
    <div class="card-class">${d.class}</div>
    <div class="card-foot">
      <span class="eff-pill ${d.effClass}">${d.efficacy}</span>
      <span class="card-arr">›</span>
    </div>
  </div>`;
}

function renderDrugs(){
  const list = filterDrugs();
  const noRes = document.getElementById('noResults');
  const dl = document.getElementById('drugList');
  const rb = document.getElementById('resultsBar');
  rb.textContent = state.search
    ? `${list.length} result${list.length!==1?'s':''} for "${state.search}"`
    : `${list.length} medication${list.length!==1?'s':''}`;

  if(!list.length){ dl.innerHTML=''; noRes.classList.remove('hidden'); return; }
  noRes.classList.add('hidden');

  if(state.tab==='all' && !state.search){
    // Group by class
    let html='';
    GROUPS.forEach(g=>{
      const gd=list.filter(d=>d.group===g.id);
      if(!gd.length) return;
      html+=`<div class="grp-hdr"><div class="grp-dot" style="background:${g.dot}"></div><h2>${g.label}</h2><span>(${gd.length})</span></div>`;
      html+=`<div class="grid">${gd.map(cardHtml).join('')}</div>`;
    });
    dl.innerHTML=html;
  } else {
    dl.innerHTML=`<div class="grid">${list.map(cardHtml).join('')}</div>`;
  }

  dl.querySelectorAll('.card').forEach(el=>{
    const open=()=>openDrug(el.dataset.id);
    el.addEventListener('click',open);
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')open()});
  });
}

function dosingHtml(d){
  let h='';
  const steps = (d.dosing||[]).filter(x=>x.step);
  const notes = (d.dosing||[]).filter(x=>!x.step);
  if(steps.length){
    h+=`<div class="dsec"><div class="dsec-title">Dosing Steps</div>`;
    h+=steps.map(x=>`<div class="dstep"><div class="dstep-n">${x.n}</div><div class="dstep-t">${x.t}</div></div>`).join('');
    h+='</div>';
  }
  notes.forEach(x=>{
    if(x.warn) h+=`<div class="warn-box">⚠️ ${x.warn}</div>`;
    if(x.info) h+=`<div class="info-box">ℹ️ ${x.info}</div>`;
  });
  if(d.dosingNote) h+=`<div class="stop-box"><strong>⏱ Clinical Note</strong><p>${d.dosingNote}</p></div>`;
  if(d.stopRule) h+=`<div class="stop-box" style="margin-top:8px"><strong>🛑 Stop / Reassessment Rule</strong><p>${d.stopRule}</p></div>`;
  return h;
}

function sideHtml(d){
  let h=`<div class="dsec"><div class="dsec-title">Key Side Effects</div>`;
  h+=(d.side||[]).map(s=>`<div class="ditem">${s}</div>`).join('');
  h+='</div>';
  const bboxItems = (d.side||[]).filter(s=>s.toLowerCase().includes('black box'));
  if(bboxItems.length) h+=`<div class="warn-box">⚠️ <strong>Black Box Warning:</strong> ${bboxItems[0].replace(/Black Box[^:]*:/i,'').trim()}</div>`;
  return h;
}

function contraHtml(d){
  let h=`<div class="dsec"><div class="dsec-title">Contraindications & Cautions</div>`;
  h+=(d.contra||[]).map(c=>`<div class="ditem">${c}</div>`).join('');
  h+='</div>';
  return h;
}

function openDrug(id){
  const d = getDrugById(id);
  if(!d) return;
  const g = GROUPS.find(g=>g.id===d.group);
  state.openDrug=id;

  // Header
  document.getElementById('dsHdr').innerHTML=`
    <div class="ds-grp-lbl" style="color:${g?g.color:'#64748B'}">${g?g.label:''}</div>
    <div class="ds-name">${d.name}</div>
    <div class="ds-brand">${d.brand}</div>
    <div class="ds-badges">${d.badges.map(b=>`<span class="ds-badge ${b[0]}">${b[1]}</span>`).join('')}</div>
  `;

  // Efficacy strip
  document.getElementById('dsEffStrip').innerHTML=`
    <div class="eff-strip-l">
      <div class="lbl">Approx. Efficacy</div>
      <div class="val">${d.efficacy}</div>
    </div>
    <div class="eff-strip-r">Total body weight loss vs placebo (phase 3 data)</div>
  `;

  // Panels
  document.getElementById('dpanel-dosing').innerHTML = dosingHtml(d);
  document.getElementById('dpanel-side').innerHTML   = sideHtml(d);
  document.getElementById('dpanel-contra').innerHTML = contraHtml(d);

  // Reset tabs
  state.activeDtab='dosing';
  document.querySelectorAll('.dtab').forEach(t=>{
    t.classList.toggle('on', t.dataset.tab==='dosing');
  });
  document.querySelectorAll('.dpanel').forEach(p=>{
    p.classList.toggle('on', p.id==='dpanel-dosing');
  });

  openSheet('drugSheet');
}

// ══════════════════════════════════════════════════════════════════════
// SHEET UTILS
// ══════════════════════════════════════════════════════════════════════
function openSheet(id){
  document.getElementById('overlay').classList.add('on');
  document.getElementById(id).classList.add('on');
  document.body.style.overflow='hidden';
}

function closeAll(){
  document.getElementById('overlay').classList.remove('on');
  ['drugSheet','nsSheet'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.body.style.overflow='';
  state.openDrug=null;
}

// ══════════════════════════════════════════════════════════════════════
// NEXT STEP TOOL
// ══════════════════════════════════════════════════════════════════════
function nsBodyHtml(){
  const sel = state.nsSelected;
  const eligible = DRUGS.filter(d=>d.group<=8); // exclude pipeline from "tried" list

  let h = `<div class="ns-sec-t">Select all medications that have been tried and failed:</div>`;
  h += `<div class="ns-list">`;
  eligible.forEach(d=>{
    const isSel = sel.has(d.id);
    h += `<div class="ns-row${isSel?' sel':''}" data-nid="${d.id}">
      <div class="ns-row-info">
        <div class="nm">${d.name}</div>
        <div class="br">${d.brand}</div>
      </div>
      <div class="ns-chk">${isSel?'✓':''}</div>
    </div>`;
  });
  h += `</div>`;

  if(sel.size===0){
    h += `<div class="ns-empty"><div class="ico">💊</div><p>Select one or more medications above to see the next clinical recommendation.</p></div>`;
  } else {
    h += `<div class="divider"></div>`;
    h += `<div class="ns-sec-t">Clinical Recommendation</div>`;
    h += buildRec();
  }
  return h;
}

function buildRec(){
  const sel = [...state.nsSelected];
  // Find the most advanced drug tried (highest efficacy class)
  const order = ['bupropion','metformin','topiramate','diethylpropion','phendimetrazine','benzphetamine',
                  'phentermine','orlistat','contrave','qsymia','liraglutide','orforglipron','oralsema',
                  'semaglutide','tirzepatide','setmelanotide'];
  let best = null;
  order.forEach(id=>{ if(sel.includes(id)) best=id; });
  if(!best) best = sel[sel.length-1];

  const rec = RECS[best];
  if(!rec) return `<div class="ns-empty"><p>No recommendation available for selection.</p></div>`;

  if(!rec.next){
    return `<div class="rec-card">
      <div class="rec-lbl">⚕ Clinical Note</div>
      <div class="rec-name">Next Steps</div>
      <div class="rec-why">${rec.why}</div>
      <div class="rec-chk-box">
        <div class="t">Suggested Actions</div>
        ${(rec.contra_check||[]).map(c=>`<div class="rec-chk-item">${c}</div>`).join('')}
      </div>
    </div>`;
  }

  const nextDrug = getDrugById(rec.next);
  if(!nextDrug) return '';

  const prevNames = sel.map(id=>{const dd=getDrugById(id);return dd?dd.name:id}).join(', ');

  let h = `<div class="rec-card">
    <div class="rec-lbl">⚕ Recommended Next Agent</div>
    <div class="rec-name">${nextDrug.name}</div>
    <div class="rec-brand">${nextDrug.brand}</div>
    <div class="rec-stats">
      <div class="rec-stat"><div class="sl">Prior Agent(s)</div><div class="sv">${rec.prev_eff}</div></div>
      <div class="rec-stat"><div class="sl">Expected Next</div><div class="sv">${rec.next_eff}</div></div>
    </div>
    <div class="rec-why">${rec.why}</div>
    <div class="rec-chk-box">
      <div class="t">Check Before Prescribing</div>
      ${rec.contra_check.map(c=>`<div class="rec-chk-item">${c}</div>`).join('')}
    </div>
    <button class="btn-view" data-view="${rec.next}">View Full ${nextDrug.name} Profile →</button>
  </div>`;

  // Comparison table
  h += `<div class="ns-sec-t" style="margin-top:4px">Comparison: Prior vs Recommended</div>`;
  const prevD = getDrugById(best);
  h += `<table class="cmp-tbl"><thead><tr><th>Category</th><th class="c-old">${prevD?prevD.name:'Prior'}</th><th class="c-new">${nextDrug.name}</th></tr></thead><tbody>`;
  h += `<tr><td class="c-lbl">Mechanism</td><td>${prevD?prevD.class:'—'}</td><td>${nextDrug.class}</td></tr>`;
  h += `<tr><td class="c-lbl">Approx. Efficacy</td><td class="c-old">${rec.prev_eff}</td><td class="c-new">${rec.next_eff}</td></tr>`;
  h += `<tr><td class="c-lbl">Route / Freq.</td><td>${routeLabel(best)}</td><td>${routeLabel(rec.next)}</td></tr>`;
  h += `<tr><td class="c-lbl">FDA Status</td><td>${prevD?prevD.fda:'—'}</td><td>${nextDrug.fda}</td></tr>`;
  h += `</tbody></table>`;

  return h;
}

function routeLabel(id){
  const routes={
    phentermine:'Oral, daily',diethylpropion:'Oral, daily',phendimetrazine:'Oral, daily',benzphetamine:'Oral, daily',
    orlistat:'Oral, TID',qsymia:'Oral, daily',contrave:'Oral, BID',
    liraglutide:'SC injection, daily',semaglutide:'SC injection, weekly',oralsema:'Oral, daily',
    orforglipron:'Oral, daily',tirzepatide:'SC injection, weekly',setmelanotide:'SC injection, daily',
    metformin:'Oral, daily–BID',topiramate:'Oral, BID',bupropion:'Oral, daily–BID',
    cagrisema:'SC injection, weekly',retatrutide:'SC injection, weekly'
  };
  return routes[id]||'—';
}

function renderNsBody(){
  document.getElementById('nsBody').innerHTML = nsBodyHtml();
  // Row listeners
  document.querySelectorAll('.ns-row').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.nid;
      if(state.nsSelected.has(id)) state.nsSelected.delete(id);
      else state.nsSelected.add(id);
      document.getElementById('fabBtn').classList.toggle('has-sel',state.nsSelected.size>0);
      renderNsBody();
    });
  });
  // View drug button
  const vb = document.getElementById('nsBody').querySelector('[data-view]');
  if(vb) vb.addEventListener('click',()=>{
    closeAll();
    setTimeout(()=>openDrug(vb.dataset.view),50);
  });
}
